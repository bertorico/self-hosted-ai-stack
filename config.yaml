model_list:
  # ===== Local Ollama models =====
  # Add/remove entries to match the models you've pulled with `ollama pull`
  - model_name: llama3.2
    litellm_params:
      model: ollama_chat/llama3.2:3b
      api_base: http://ollama:11434

  - model_name: codellama
    litellm_params:
      model: ollama_chat/codellama:latest
      api_base: http://ollama:11434

  - model_name: gemma3
    litellm_params:
      model: ollama_chat/gemma3:latest
      api_base: http://ollama:11434

  - model_name: qwen2.5
    litellm_params:
      model: ollama_chat/qwen2.5:14b
      api_base: http://ollama:11434

  - model_name: qwen2.5-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://ollama:11434

  - model_name: deepseek-r1
    litellm_params:
      model: ollama_chat/deepseek-r1:14b
      api_base: http://ollama:11434

  - model_name: embeddinggemma
    litellm_params:
      model: ollama/embeddinggemma:latest
      api_base: http://ollama:11434

