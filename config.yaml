# Global LiteLLM settings
litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 600
  num_retries: 3

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
